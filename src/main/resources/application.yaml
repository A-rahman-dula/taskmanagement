spring:
  application:
    name: taskmanagement

  datasource:
    url: jdbc:mysql://localhost:3306/taskdb
    username: taskuser
    password: Task@1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:mysupersecuresecretkeymysupersecuresecretkey}
  expiration: 3600000